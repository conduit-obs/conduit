name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  binaries:
    name: Build Binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          go build -ldflags "-X github.com/conduit-obs/conduit/internal/version.Version=$VERSION -X github.com/conduit-obs/conduit/internal/version.BuildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ) -X github.com/conduit-obs/conduit/internal/version.GitCommit=$(git rev-parse --short HEAD)" -o conduit-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/conduit
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: conduit-${{ matrix.goos }}-${{ matrix.goarch }}
          path: conduit-${{ matrix.goos }}-${{ matrix.goarch }}

  docker:
    name: Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository }}:latest

  helm:
    name: Package Helm Charts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Helm
        uses: azure/setup-helm@v4
      - name: Package control plane chart
        run: |
          helm package deploy/helm/conduit --version ${GITHUB_REF_NAME#v} --app-version ${GITHUB_REF_NAME#v}
      - name: Package collector chart
        run: |
          helm package deploy/helm/conduit-collector --version ${GITHUB_REF_NAME#v} --app-version ${GITHUB_REF_NAME#v}
      - name: Upload charts
        uses: actions/upload-artifact@v4
        with:
          name: helm-charts
          path: "*.tgz"

  release:
    name: Create GitHub Release
    needs: [binaries, docker, helm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f \( -name "conduit-*" -o -name "*.tgz" \) -exec sha256sum {} \; > SHA256SUMS
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/conduit-*
            artifacts/**/*.tgz
            artifacts/SHA256SUMS
